name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Build jar
        run: ./build.sh

      - name: Upload jar
        uses: actions/upload-artifact@v7
        with:
          name: fario-jar
          path: dist/fario.jar
